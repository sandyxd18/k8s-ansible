---
# =============================================================================
# CLUSTER TOPOLOGY SELECTOR
# Pilih skenario instalasi Kubernetes:
#   - base          : Single control-plane, tanpa HA (1 master + N workers)
#   - stacked_etcd  : HA control-plane, etcd stack di master (N masters + N workers + LB)
#   - external_etcd : HA control-plane, etcd di node terpisah (N masters + N etcd + N workers + LB)
# =============================================================================
cluster_topology: "base"

# =============================================================================
# KUBERNETES CONFIGURATION
# =============================================================================
kubernetes_version: "1.28.0"
kubernetes_version_rhel_package: "1.28.0-0"

cluster_name: "example-test"

# =============================================================================
# NETWORK CONFIGURATION
# =============================================================================
service_network_cidr: "10.96.0.0/12"
pod_network_cidr: "10.244.0.0/16"

# Digunakan hanya untuk skenario 'base' (single master, tanpa LB)
apiserver_advertise_address: "192.168.1.10"

# Digunakan untuk skenario 'stacked_etcd' dan 'external_etcd' (VIP Load Balancer)
lb_ip: "10.0.0.110"
vip_prefix: "24"

# control_plane_endpoint otomatis menyesuaikan topology
control_plane_endpoint: >-
  {{ apiserver_advertise_address ~ ':6443'
     if cluster_topology == 'base'
     else lb_ip ~ ':6443' }}

# =============================================================================
# CNI PLUGIN SELECTION
# Pilihan: calico, flannel, cilium
# =============================================================================
cni_plugin: "calico"

# Calico specific settings
calico_version: "v3.26.1"

# Flannel specific settings
flannel_version: "v0.22.0"

# Cilium specific settings
cilium_version: "1.18.6"

# =============================================================================
# ADDONS CONFIGURATION
# Berlaku untuk semua skenario (base, stacked_etcd, external_etcd)
# =============================================================================
addons:
  # Helm
  helm:
    enabled: false
    version: "v3.17.3"

  # MetalLB Load Balancer
  metallb:
    enabled: false
    version: "v0.13.10"
    ip_range: "192.168.1.240-192.168.1.250"

  # OpenEBS Storage Provider
  openebs:
    enabled: false

  # Metrics Server
  metrics_server:
    enabled: false
    version: "v0.8.0"

  # ArgoCD non-HA
  argocd:
    enabled: false
    version: "v3.2.5"

  # Longhorn Distributed Storage
  longhorn:
    enabled: false
    version: "v1.11.0"

  # Istio Service Mesh
  istio:
    enabled: false
    version: "1.28.3"
    profile: "default"  # options: demo, minimal, default, remote, empty, preview, ambient
    injection_namespace: "istio-injection"

# =============================================================================
# CONTAINER RUNTIME CONFIGURATION
# Pilihan: containerd, docker, cri-o
# =============================================================================
container_runtime: "containerd"
crio_version: "v1.35"

# =============================================================================
# SYSTEM CONFIGURATION
# =============================================================================
disable_swap: true
enable_ipv4_forwarding: true

# Firewall Configuration (untuk firewalld pada RHEL/CentOS)
configure_firewall: false

# =============================================================================
# LOAD BALANCER & HIGH AVAILABILITY CONFIGURATION
# Digunakan untuk skenario: stacked_etcd, external_etcd
# =============================================================================
keepalived_vrid: 51
keepalived_interface: eth0
keepalived_auth_pass: "ChangeThisSecret!"

# =============================================================================
# ETCD CONFIGURATION
# Digunakan hanya untuk skenario: external_etcd
# =============================================================================
etcd_peer_port: 2380
etcd_client_port: 2379